services:
  mysql:
    image: mysql:8.4
    container_name: ai-service-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: ai_service
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uai_user", "-pai_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-mock-service:
    build:
      context: ./ai-mock-service
    container_name: ai-mock-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
    container_name: ai-service-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai-mock-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ai_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ai_user
      DB_PASSWORD: ai_pass
      AI_BASE_URL: http://ai-mock-service:8000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ai-service-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      FRONTEND_API_UPSTREAM: http://backend:8080
    ports:
      - "5173:80"

volumes:
  mysql_data:
