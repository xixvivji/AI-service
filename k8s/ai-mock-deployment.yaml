apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mock-service
  namespace: ai-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-mock-service
  template:
    metadata:
      labels:
        app: ai-mock-service
    spec:
      containers:
        - name: ai-mock-service
          image: YOUR_REGISTRY/ai-mock-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
