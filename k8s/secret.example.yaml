apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secret
  namespace: ai-service
type: Opaque
stringData:
  DB_USERNAME: ai_user
  DB_PASSWORD: replace-with-db-password
  MYSQL_DATABASE: ai_service
  MYSQL_USER: ai_user
  MYSQL_PASSWORD: replace-with-db-password
  MYSQL_ROOT_PASSWORD: replace-with-root-password
