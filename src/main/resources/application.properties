spring.application.name=ai-service

# MySQL datasource defaults for local Docker Compose
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/ai_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:ai_user}
spring.datasource.password=${DB_PASSWORD:ai_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.shutdown=graceful

ai.client.base-url=${AI_BASE_URL:http://localhost:8000}
ai.client.analysis-path=${AI_ANALYSIS_PATH:/api/v1/analyze}
ai.client.connect-timeout-millis=2000
ai.client.read-timeout-millis=5000
